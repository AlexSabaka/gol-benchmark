{% if items %}
<table class="compact">
  <thead><tr><th>Name</th><th>Tasks</th><th>Tests</th><th>Created</th></tr></thead>
  <tbody>
    {% for s in items %}
    <tr>
      <td><a href="/testsets">{{ s.filename }}</a></td>
      <td>{% for t in s.get('task_types', []) %}<span class="chip">{{ t }}</span>{% endfor %}</td>
      <td>{{ s.get('test_count', '?') }}</td>
      <td class="text-muted">{{ s.get('created', '') }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="text-muted">No test sets yet. <a href="/configure">Generate one →</a></p>
{% endif %}
