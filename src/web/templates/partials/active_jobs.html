{% if jobs %}
{% for j in jobs %}
<article style="margin-bottom:.5rem;">
  <strong>{{ j.model_name }}</strong>
  <span class="badge badge-info">{{ j.state }}</span>
  {{ j.progress_current }}/{{ j.progress_total }} tests
</article>
{% endfor %}
{% else %}
<p class="text-muted">No active jobs.</p>
{% endif %}
