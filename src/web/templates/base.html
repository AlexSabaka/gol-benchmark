<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GoL Benchmark{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>

<nav class="top-nav">
  <a href="/" class="brand">🧬 GoL Benchmark</a>
  <a href="/" {% if request.url.path == "/" %}aria-current="page"{% endif %}>Dashboard</a>
  <a href="/configure" {% if request.url.path == "/configure" %}aria-current="page"{% endif %}>Configure</a>
  <a href="/testsets" {% if request.url.path == "/testsets" %}aria-current="page"{% endif %}>Test Sets</a>
  <a href="/execute" {% if request.url.path == "/execute" %}aria-current="page"{% endif %}>Execute</a>
  <a href="/results" {% if request.url.path == "/results" %}aria-current="page"{% endif %}>Results</a>
</nav>

<div id="flash"></div>

<main class="container">
  {% block content %}{% endblock %}
</main>

<footer class="container" style="text-align:center; padding:1rem; color:var(--muted); font-size:.82rem;">
  GoL Benchmark v3.0 — FastAPI + HTMX
</footer>

<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
