{% extends "base.html" %}
{% block title %}Dashboard — GoL Benchmark{% endblock %}
{% block content %}
<h2>Dashboard</h2>

<div class="cards" id="summary-cards"
     hx-get="/api/dashboard-summary"
     hx-trigger="load"
     hx-swap="innerHTML">
  <div class="card"><div class="value">…</div><div class="label">Test Sets</div></div>
  <div class="card"><div class="value">…</div><div class="label">Results</div></div>
  <div class="card"><div class="value">…</div><div class="label">Active Jobs</div></div>
</div>

<div style="display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem;">
  <a href="/configure" role="button">+ New Test Set</a>
  <a href="/execute" role="button" class="outline">Run Benchmark</a>
  <a href="/results" role="button" class="secondary">View Results</a>
</div>

<h4>Recent Test Sets</h4>
<div id="recent-testsets" hx-get="/partials/recent-testsets" hx-trigger="load" hx-swap="innerHTML">
  <p aria-busy="true">Loading…</p>
</div>

<h4 class="mt-1">Recent Results</h4>
<div id="recent-results" hx-get="/partials/recent-results" hx-trigger="load" hx-swap="innerHTML">
  <p aria-busy="true">Loading…</p>
</div>

<h4 class="mt-1">Active Jobs</h4>
<div id="active-jobs" hx-get="/partials/active-jobs" hx-trigger="load, every 5s" hx-swap="innerHTML">
  <p aria-busy="true">Loading…</p>
</div>
{% endblock %}
