{% extends "base.html" %}
{% block title %}Results — GoL Benchmark{% endblock %}
{% block content %}
<h2>Results &amp; Analysis</h2>
<p class="text-muted">Browse benchmark results, compare models, and generate reports.</p>

<div id="results-table" hx-get="/partials/results-table" hx-trigger="load" hx-swap="innerHTML">
  <p aria-busy="true">Loading results…</p>
</div>

<div style="margin:1rem 0; display:flex; gap:1rem; flex-wrap:wrap;">
  <button type="button" onclick="analyzeSelected()">📊 Compare Selected</button>
  <button type="button" class="outline" onclick="generateReport()">📄 Generate HTML Report</button>
</div>

<div id="analysis-output"></div>
<div id="result-detail"></div>
{% endblock %}

{% block scripts %}
<script>
function getSelectedResults() {
  return Array.from(document.querySelectorAll('input[name="result-select"]:checked')).map(cb => cb.value);
}

async function analyzeSelected() {
  const filenames = getSelectedResults();
  if (!filenames.length) { flash('Select at least one result file', 'error'); return; }

  const output = document.getElementById('analysis-output');
  output.innerHTML = '<p aria-busy="true">Analyzing…</p>';

  try {
    const resp = await fetch('/api/results/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ result_filenames: filenames, comparison: true }),
    });
    const data = await resp.json();
    if (!resp.ok) { output.innerHTML = `<p style="color:var(--danger)">${data.detail}</p>`; return; }

    let html = '<h4>Analysis Results</h4>';
    html += '<table class="compact"><thead><tr><th>Model</th><th>Accuracy</th><th>Correct</th><th>Total</th><th>Parse Errors</th><th>Duration</th></tr></thead><tbody>';
    for (const [model, stats] of Object.entries(data.models || {})) {
      html += `<tr>
        <td><strong>${model}</strong></td>
        <td>${fmtPct(stats.accuracy)}</td>
        <td>${stats.correct}</td>
        <td>${stats.total_tests}</td>
        <td>${fmtPct(stats.parse_error_rate)}</td>
        <td>${fmtDuration(stats.duration)}</td>
      </tr>`;
    }
    html += '</tbody></table>';

    // Task breakdowns
    for (const [model, stats] of Object.entries(data.models || {})) {
      if (stats.task_breakdown && Object.keys(stats.task_breakdown).length > 1) {
        html += `<details><summary>Task breakdown — ${model}</summary><table class="compact"><thead><tr><th>Task</th><th>Accuracy</th><th>Total</th></tr></thead><tbody>`;
        for (const [task, ts] of Object.entries(stats.task_breakdown)) {
          html += `<tr><td>${task}</td><td>${fmtPct(ts.accuracy)}</td><td>${ts.total || '—'}</td></tr>`;
        }
        html += '</tbody></table></details>';
      }
    }
    output.innerHTML = html;
  } catch (e) {
    output.innerHTML = `<p style="color:var(--danger)">Error: ${e.message}</p>`;
  }
}

async function generateReport() {
  const filenames = getSelectedResults();
  if (!filenames.length) { flash('Select at least one result file', 'error'); return; }

  const output = document.getElementById('analysis-output');
  output.innerHTML = '<p aria-busy="true">Generating report…</p>';

  try {
    const resp = await fetch('/api/results/generate-report', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ result_filenames: filenames, comparison: true }),
    });
    const data = await resp.json();
    if (!resp.ok) { output.innerHTML = `<p style="color:var(--danger)">${data.detail}</p>`; return; }
    output.innerHTML = `<p>✓ Report generated: <a href="/api/results/report/${data.filename}" target="_blank">${data.filename}</a></p>`;
  } catch (e) {
    output.innerHTML = `<p style="color:var(--danger)">Error: ${e.message}</p>`;
  }
}

async function showResultDetail(filename) {
  const el = document.getElementById('result-detail');
  el.innerHTML = '<p aria-busy="true">Loading…</p>';

  try {
    const resp = await fetch(`/api/results/${filename}`);
    const data = await resp.json();
    el.innerHTML = `
      <article>
        <header><strong>${filename}</strong></header>
        <p><strong>Model:</strong> ${data.model_info?.model_name || '?'} (${data.model_info?.provider || '?'})
           &nbsp;|&nbsp; <strong>Accuracy:</strong> ${fmtPct(data.summary_statistics?.accuracy)}
           &nbsp;|&nbsp; <strong>Tests:</strong> ${data.results_count}</p>
        <details><summary>Summary Statistics</summary><pre class="json">${JSON.stringify(data.summary_statistics, null, 2)}</pre></details>
        <details><summary>Execution Info</summary><pre class="json">${JSON.stringify(data.execution_info, null, 2)}</pre></details>
        <details><summary>Sample Results (first 10)</summary><pre class="json">${JSON.stringify(data.results?.slice(0, 10), null, 2)}</pre></details>
      </article>`;
  } catch (e) {
    el.innerHTML = `<p style="color:var(--danger)">Error: ${e.message}</p>`;
  }
}
</script>
{% endblock %}
