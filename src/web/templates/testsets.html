{% extends "base.html" %}
{% block title %}Test Sets — GoL Benchmark{% endblock %}
{% block content %}
<h2>Test Sets</h2>
<p class="text-muted">Browse generated test sets. Click a row to see details. Use actions to run or delete.</p>

<div id="testsets-table" hx-get="/partials/testsets-table" hx-trigger="load" hx-swap="innerHTML">
  <p aria-busy="true">Loading test sets…</p>
</div>

<div id="testset-detail"></div>
{% endblock %}

{% block scripts %}
<script>
async function deleteTestset(filename) {
  if (!confirm(`Delete ${filename}?`)) return;
  const resp = await fetch(`/api/testsets/${filename}`, { method: 'DELETE' });
  if (resp.ok) {
    flash('Deleted ' + filename, 'success');
    htmx.trigger('#testsets-table', 'load');
  } else {
    flash('Delete failed', 'error');
  }
}

async function showTestsetDetail(filename) {
  const resp = await fetch(`/api/testsets/${filename}`);
  const data = await resp.json();
  const el = document.getElementById('testset-detail');
  el.innerHTML = `
    <article>
      <header><strong>${filename}</strong></header>
      <p><strong>Tasks:</strong> ${(data.task_types||[]).join(', ')}&nbsp;&nbsp;|&nbsp;&nbsp;
         <strong>Tests:</strong> ${data.test_count}</p>
      <details>
        <summary>Metadata</summary>
        <pre class="json">${JSON.stringify(data.metadata, null, 2)}</pre>
      </details>
      <details>
        <summary>Generation Params</summary>
        <pre class="json">${JSON.stringify(data.generation_params, null, 2)}</pre>
      </details>
      <details>
        <summary>Sample Cases (first 5)</summary>
        <pre class="json">${JSON.stringify(data.sample_cases, null, 2)}</pre>
      </details>
      <a href="/execute?testset=${encodeURIComponent(data.filename)}" role="button">Run on models →</a>
    </article>`;
}
</script>
{% endblock %}
