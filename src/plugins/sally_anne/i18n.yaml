# Sally-Anne plugin — false belief test (Theory of Mind).
#
# Variables: {narrative}, {question}
#
# The body is composed with shared style wrappers from styles.yaml.
# All three styles are domain-specific (scenario + belief question framing) and fully overridden.

body:
  en: "{narrative}\n\n{question}"
  es: "{narrative}\n\n{question}"
  fr: "{narrative}\n\n{question}"
  de: "{narrative}\n\n{question}"
  zh: "{narrative}\n\n{question}"
  ua: "{narrative}\n\n{question}"

overrides:
  minimal:
    en: "{narrative}\n\n{question}\nAnswer:"
    es: "{narrative}\n\n{question}\nRespuesta:"
    fr: "{narrative}\n\n{question}\nRéponse :"
    de: "{narrative}\n\n{question}\nAntwort:"
    zh: "{narrative}\n\n{question}\n答案："
    ua: "{narrative}\n\n{question}\nВідповідь:"
  casual:
    en: "Here's a little scenario for you:\n\n{narrative}\n\n{question} Just give me the answer in one word."
    es: "Aquí tienes un pequeño escenario:\n\n{narrative}\n\n{question} Solo dame la respuesta en una palabra."
    fr: "Voici un petit scénario pour toi :\n\n{narrative}\n\n{question} Donne-moi la réponse en un seul mot."
    de: "Hier ist ein kleines Szenario für dich:\n\n{narrative}\n\n{question} Gib mir die Antwort in einem einzigen Wort."
    zh: "这里有一个小场景：\n\n{narrative}\n\n{question} 请用一个词回答。"
    ua: "Ось невеличкий сценарій для тебе:\n\n{narrative}\n\n{question} Дай відповідь одним словом."
  linguistic:
    en: "Please read the following scenario carefully and answer the question about what the character believes.\n\n{narrative}\n\n{question}\nProvide your answer as a single word."
    es: "Lee atentamente el siguiente escenario y responde a la pregunta sobre lo que el personaje cree.\n\n{narrative}\n\n{question}\nProporciona tu respuesta en una sola palabra."
    fr: "Veuillez lire attentivement le scénario suivant et répondre à la question sur ce que le personnage croit.\n\n{narrative}\n\n{question}\nFournissez votre réponse en un seul mot."
    de: "Bitte lesen Sie das folgende Szenario sorgfältig und beantworten Sie die Frage darüber, was die Person glaubt.\n\n{narrative}\n\n{question}\nGeben Sie Ihre Antwort als ein einzelnes Wort an."
    zh: "请仔细阅读以下场景，并回答关于角色所相信的内容的问题。\n\n{narrative}\n\n{question}\n请用一个词作答。"
    ua: "Будь ласка, уважно прочитайте наступний сценарій та дайте відповідь на запитання про те, у що вірить персонаж.\n\n{narrative}\n\n{question}\nНадайте відповідь одним словом."

# ══════════════════════════════════════════════════════════════════════
# Scenario data (migrated from scenario_i18n.py)
# ══════════════════════════════════════════════════════════════════════

# ── Narrative sentence templates ─────────────────────────────────────
# Keys: place, leave, move, witness, witness_move, return
# UA: gender-split (m/f sub-dicts) for past-tense verb inflection
# Placeholders: {name}, {poss}, {obj}, {container}, {leave_activity},
#   {name_a}, {name_b}, {container_a}, {container_b}
# Language-specific: {obj_acc}, {container_acc}, {art_def}, {prep_from}, etc.

narrative_templates:
  en:
    place: "{name} puts {poss} {obj} in the {container}."
    leave: "{name} {leave_activity}."
    move: "While {name_a} is away, {name_b} takes the {obj} from the {container_a} and puts it in the {container_b}."
    witness: "{name} watches {name_a} put the {obj} in the {container}."
    witness_move: "{name} sees {name_b} move the {obj} to the {container_b}."
    return: "{name} returns."
  es:
    place: "{name} pone {poss} {obj} en {art_def_cont} {container}."
    leave: "{name} {leave_activity}."
    move: "Mientras {name_a} está fuera, {name_b} saca {art_def_obj} {obj} {prep_from} {container_a} y {pron_obj} pone en {art_def_cont_b} {container_b}."
    witness: "{name} observa cómo {name_a} pone {art_def_obj} {obj} en {art_def_cont} {container}."
    witness_move: "{name} ve a {name_b} mover {art_def_obj} {obj} a {art_def_cont_b} {container_b}."
    return: "{name} regresa."
  fr:
    place: "{name} met {poss} {obj} dans {art_def} {container}."
    leave: "{name} {leave_activity}."
    move: "Pendant que {name_a} est {absent}, {name_b} prend {art_def_obj} {obj} {prep_from} {container_a} et {pron_obj} met dans {art_def_cont_b} {container_b}."
    witness: "{name} regarde {name_a} mettre {art_def_obj} {obj} dans {art_def} {container}."
    witness_move: "{name} voit {name_b} déplacer {art_def_obj} {obj} vers {art_def_cont_b} {container_b}."
    return: "{name} revient."
  de:
    place: "{name} legt {poss_acc} {obj} in {art_acc_cont} {container}."
    leave: "{name} {leave_activity}."
    move: "Während {name_a} weg ist, nimmt {name_b} {art_acc_obj} {obj} aus {art_dat_cont_a} {container_a} und legt {pron_obj} in {art_acc_cont_b} {container_b}."
    witness: "{name} beobachtet, wie {name_a} {art_acc_obj} {obj} in {art_acc_cont} {container} legt."
    witness_move: "{name} sieht, wie {name_b} {art_acc_obj} {obj} in {art_acc_cont_b} {container_b} legt."
    return: "{name} kommt zurück."
  zh:
    place: "{name}把{poss}{obj}放在{container}里。"
    leave: "{name}{leave_activity}。"
    move: "趁{name_a}不在的时候，{name_b}把{obj}从{container_a}里拿出来，放进了{container_b}里。"
    witness: "{name}看到{name_a}把{obj}放在{container}里。"
    witness_move: "{name}看到{name_b}把{obj}移到了{container_b}里。"
    return: "{name}回来了。"
  ua:
    m:
      place: "{name} поклав {poss} {obj_acc} у {container_acc}."
      leave: "{name} {leave_activity}."
      move: "Поки {name_a} немає, {name_b} {took} {obj_acc} з {container_a_gen} і {put} у {container_b_acc}."
      witness: "{name} спостерігав за всім."
      witness_move: "{name} бачив, як {name_b} {moved} {obj_acc} до {container_b_gen}."
      return: "{name} повернувся."
    f:
      place: "{name} поклала {poss} {obj_acc} у {container_acc}."
      leave: "{name} {leave_activity}."
      move: "Поки {name_a} немає, {name_b} {took} {obj_acc} з {container_a_gen} і {put} у {container_b_acc}."
      witness: "{name} спостерігала за всім."
      witness_move: "{name} бачила, як {name_b} {moved} {obj_acc} до {container_b_gen}."
      return: "{name} повернулася."

# ── Question templates ───────────────────────────────────────────────
# FR: gender-split for subject verb inversion (cherchera-t-il / cherchera-t-elle)

question_templates:
  en: "Where will {name} look for {poss} {obj}?"
  es: "¿Dónde buscará {name} {poss} {obj}?"
  fr:
    m: "Où {name} cherchera-t-il {poss} {obj} ?"
    f: "Où {name} cherchera-t-elle {poss} {obj} ?"
  de: "Wo wird {name} nach {poss_dat} {obj} suchen?"
  zh: "{name}会去哪里找{poss}{obj}？"
  ua: "De {name} шукатиме {poss} {obj_acc}?"

