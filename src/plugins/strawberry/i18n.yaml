# Strawberry plugin — character-level reasoning (6 sub-types: count, reverse,
# nth_letter, anagram, pangram, lipogram).
#
# Variables: {question} (the task-specific question text)
#
# Template system:
#   MINIMAL_TEMPLATE — "{question}\n\nAnswer: " style per language
#   CASUAL_TEMPLATE  — "Hey, quick question — {question}" style per language
#   LINGUISTIC_INTROS — per language x sub-type intro sentence
#   ANSWER_CUES       — per language x sub-type answer instruction
#
# Linguistic style is assembled as: "{intro}\n\n{question}\n\n{cue}"
# All four dicts are stored as separate top-level keys.

minimal_template:
  en: "{question}\n\nAnswer: "
  es: "{question}\n\nRespuesta: "
  fr: "{question}\n\nRéponse : "
  de: "{question}\n\nAntwort: "
  zh: "{question}\n\n答案："
  ua: "{question}\n\nВідповідь: "

casual_template:
  en: "Hey, quick question — {question}"
  es: "Oye, pregunta rápida — {question}"
  fr: "Salut, petite question — {question}"
  de: "Hey, kurze Frage — {question}"
  zh: "嘿，快问一下——{question}"
  ua: "Привіт, швидке питання — {question}"

linguistic_intros:
  en:
    count: "I have a letter-counting question for you."
    reverse: "I have a word-reversal question for you."
    nth_letter: "I have a letter-position question for you."
    anagram: "I have an anagram question for you."
    pangram: "I have a pangram question for you."
    lipogram: "I have a lipogram question for you."
  es:
