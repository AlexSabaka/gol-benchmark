# Linda Fallacy plugin — conjunction fallacy / probability ranking.
#
# Variables: {persona_description}, {ranked_items}, {num_options}
#
# The body is composed with shared style wrappers from styles.yaml.
# All three styles are domain-specific (persona + ranking layout) and fully overridden.

culture_map:
  en: [western, african, european]
  es: [latin_american, european]
  fr: [european, african]
  de: [european]
  zh: [east_asian]
  ua: [european]

body:
  en: "{persona_description}\n\n{ranked_items}"
  es: "{persona_description}\n\n{ranked_items}"
  fr: "{persona_description}\n\n{ranked_items}"
  de: "{persona_description}\n\n{ranked_items}"
  zh: "{persona_description}\n\n{ranked_items}"
  ua: "{persona_description}\n\n{ranked_items}"

overrides:
  linguistic:
    en: |
      Consider the following description:

      {persona_description}

      Based on this description, please rank the following statements from MOST probable (1) to LEAST probable ({num_options}):

      {ranked_items}

      Please provide your ranking as a numbered list, starting with the most probable option. Also, briefly explain your reasoning for the top 3 rankings.

      RANKING:
    es: |
      Considere la siguiente descripción:

      {persona_description}

      Basándose en esta descripción, por favor ordene las siguientes afirmaciones de MÁS probable (1) a MENOS probable ({num_options}):

      {ranked_items}

      Por favor, proporcione su clasificación como una lista numerada, comenzando con la opción más probable. Explique brevemente su razonamiento para las 3 primeras clasificaciones.

      CLASIFICACIÓN:
    fr: |
      Considérez la description suivante :

      {persona_description}

      Sur la base de cette description, veuillez classer les affirmations suivantes de la PLUS probable (1) à la MOINS probable ({num_options}) :

      {ranked_items}

      Veuillez fournir votre classement sous forme de liste numérotée, en commençant par l'option la plus probable. Expliquez brièvement votre raisonnement pour les 3 premiers classements.

      CLASSEMENT :
    de: |
      Betrachten Sie die folgende Beschreibung:

      {persona_description}

      Ordnen Sie auf Grundlage dieser Beschreibung die folgenden Aussagen von der WAHRSCHEINLICHSTEN (1) bis zur UNWAHRSCHEINLICHSTEN ({num_options}):

      {ranked_items}

      Bitte geben Sie Ihre Rangfolge als nummerierte Liste an, beginnend mit der wahrscheinlichsten Option. Erklären Sie kurz Ihre Begründung für die ersten 3 Platzierungen.

      RANGFOLGE:
    zh: |
      请阅读以下描述：

      {persona_description}

      根据这段描述，请将以下陈述从最可能（1）到最不可能（{num_options}）进行排序：

      {ranked_items}

      请以编号列表的形式提供您的排名，从最可能的选项开始。同时，请简要说明您对前三名排序的理由。

      排名：
    ua: |
      Розгляньте наступний опис:

      {persona_description}

      На основі цього опису, будь ласка, розташуйте наступні твердження від НАЙІМОВІРНІШОГО (1) до НАЙМЕНШ ІМОВІРНОГО ({num_options}):

      {ranked_items}

      Будь ласка, надайте ваш рейтинг у вигляді нумерованого списку, починаючи з найімовірнішого варіанту. Також коротко поясніть ваші міркування щодо перших 3 позицій.

      РЕЙТИНГ:
  casual:
    en: |
      Check out this person:

      {persona_description}

      Which of these is more likely? Rank them 1-{num_options} (most to least likely):

      {ranked_items}

      Give me your ranking and explain your top 3 picks!

      RANKING:
    es: |
      Mira esta persona:

      {persona_description}

      ¿Cuál de estas es más probable? Ordénalas del 1-{num_options} (más a menos probable):

      {ranked_items}

      ¡Dame tu clasificación y explica tus 3 primeras opciones!

      CLASIFICACIÓN:
    fr: |
      Regardez cette personne :

      {persona_description}

      Laquelle de ces options est la plus probable ? Classez-les de 1-{num_options} (plus au moins probable) :

      {ranked_items}

      Donnez-moi votre classement et expliquez vos 3 premiers choix !

      CLASSEMENT :
    de: |
      Schau dir diese Person an:

      {persona_description}

      Was davon ist wahrscheinlicher? Ordne sie von 1-{num_options} (wahrscheinlichste bis unwahrscheinlichste):

      {ranked_items}

      Gib mir deine Rangfolge und erkläre deine Top 3!

      RANGFOLGE:
    zh: |
      看看这个人：

      {persona_description}

      下面哪个更可能？从1到{num_options}排个序（从最可能到最不可能）：

      {ranked_items}

      给出你的排名，并解释你的前三个选择！

      排名：
    ua: |
      Подивись на цю людину:

      {persona_description}

      Що з цього більш імовірно? Розстав від 1 до {num_options} (від найімовірнішого до найменш імовірного):

      {ranked_items}

      Дай мені свій рейтинг і поясни свої топ-3 вибори!

      РЕЙТИНГ:
  minimal:
    en: "{persona_description}\n\nRank (1=most likely, {num_options}=least likely):\n{ranked_items}\n\nRANKING:"
    es: "{persona_description}\n\nOrdena (1=más probable, {num_options}=menos probable):\n{ranked_items}\n\nCLASIFICACIÓN:"
    fr: "{persona_description}\n\nClassez (1=plus probable, {num_options}=moins probable) :\n{ranked_items}\n\nCLASSEMENT :"
    de: "{persona_description}\n\nRangfolge (1=wahrscheinlichste, {num_options}=unwahrscheinlichste):\n{ranked_items}\n\nRANGFOLGE:"
    zh: "{persona_description}\n\n排序（1=最可能，{num_options}=最不可能）：\n{ranked_items}\n\n排名："
    ua: "{persona_description}\n\nРейтинг (1=найімовірніше, {num_options}=найменш імовірне):\n{ranked_items}\n\nРЕЙТИНГ:"
