# Inverted Cup plugin — spatial-orientation reasoning about a sealed/open cup.
#
# Variables: {source}, {description}, {extra}, {question}
#
# The body is composed with shared style wrappers from styles.yaml.
# All three styles are domain-specific (multi-variable layout) and fully overridden.

body:
  en: "{source} {description} {extra}{question}"
  es: "{source} {description} {extra}{question}"
  fr: "{source} {description} {extra}{question}"
  de: "{source} {description} {extra}{question}"
  zh: "{source} {description} {extra}{question}"
  ua: "{source} {description} {extra}{question}"

overrides:
  minimal:
    en: "{source} {description} {extra}{question}"
    es: "{source} {description} {extra}{question}"
    fr: "{source} {description} {extra}{question}"
    de: "{source} {description} {extra}{question}"
    zh: "{source} {description} {extra}{question}"
    ua: "{source} {description} {extra}{question}"
  casual:
    en: "Hey, I have a funny situation. {source} {description} {extra}{question}"
    es: "Oye, tengo una situación curiosa. {source} {description} {extra}{question}"
    fr: "Salut, j'ai une situation amusante. {source} {description} {extra}{question}"
    de: "Hey, ich habe eine lustige Situation. {source} {description} {extra}{question}"
    zh: "嘿，我遇到了一个有趣的情况。{source} {description} {extra}{question}"
    ua: "Привіт, у мене кумедна ситуація. {source} {description} {extra}{question}"
  linguistic:
    en: "I have a practical question about an unusual object I own.\n\n{source} {description} {extra}\n\n{question}"
    es: "Tengo una pregunta práctica sobre un objeto inusual que poseo.\n\n{source} {description} {extra}\n\n{question}"
    fr: "J'ai une question pratique à propos d'un objet inhabituel que je possède.\n\n{source} {description} {extra}\n\n{question}"
    de: "Ich habe eine praktische Frage zu einem ungewöhnlichen Gegenstand, den ich besitze.\n\n{source} {description} {extra}\n\n{question}"
    zh: "我有一个关于我拥有的一个不寻常物件的实际问题。\n\n{source} {description} {extra}\n\n{question}"
    ua: "У мене є практичне питання про незвичайний предмет, який я маю.\n\n{source} {description} {extra}\n\n{question}"

